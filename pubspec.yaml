name: hakari
description: "Privacy-first weight & body composition logger — TANITA BLE scales, Health Connect / HealthKit, Nostr (NIP-101h) with Amber signing and Tor/Orbot support."
publish_to: 'none'

version: 0.4.3+16

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.2

  # Rust bridge
  flutter_rust_bridge: 2.12.0
  ffi: ^2.1.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5

  # BLE (TANITA scales)
  flutter_blue_plus: ^2.3.10
  permission_handler: ^12.0.0

  # Health Connect / HealthKit
  health: ^13.1.1

  # UI
  fl_chart: ^1.0.0

  # Export
  share_plus: ^12.0.2

  # Onboarding (open Amber install page)
  url_launcher: ^6.3.1

  # At-rest encryption: Hive AES key held in Keystore/Keychain
  flutter_secure_storage: ^10.3.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/icon.png
  adaptive_icon_background: "#9FF0E0"
  adaptive_icon_foreground: assets/icon/icon_foreground.png
  remove_alpha_ios: true
