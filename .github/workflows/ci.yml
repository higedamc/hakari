name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.6
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo test
      - run: cargo fmt --check

  cargo-audit:
    runs-on: ubuntu-latest
    # rustsec/audit-check posts its results as a check run.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: rust

  gitleaks:
    runs-on: ubuntu-latest
    # Dependabot-triggered runs get a read-only GITHUB_TOKEN, which makes
    # gitleaks-action's PR-summary API call fail (false negative CI red).
    # Dependabot never introduces our secrets; push/PR runs by humans
    # still scan the full history.
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
